name: Backend CI

on:
  push:
    paths:
      - "apps/backend/**"
      - "package/**"
  pull_request:
    paths:
      - "apps/backend/**"
      - "package/**"

jobs:

  # Fast Package-Level Unit Tests
  package-unit-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          cd package
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pyyaml

      - name: Run package unit tests
        run: |
          cd package
          pytest tests/unit -v --cov=pyaslreport --cov-report=term-missing


 
  #Backend Integration Tests
  backend-integration-tests:
    runs-on: ubuntu-latest
    needs: package-unit-tests   

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        run: |
          cd apps/backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-regressions pytest-cov httpx

      - name: Install package (editable)
        run: |
          cd package
          pip install -e .

      - name: Run backend integration tests
        run: |
          cd apps/backend
          pytest -v --cov=app --cov-report=term-missing --cov-report=xml